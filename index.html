<div class="view-platform relative z-10">
<button id="smart-back-btn" class="smart-back-btn" onclick="smartBack()"><span class="material-symbols-outlined">arrow_forward</span><span id="smart-back-label">العودة للرئيسية</span></button>
<div id="dashboard">
<div class="main-container">
<div class="welcome-card" id="hero-welcome">
  <div class="wc-header"><div class="wc-icon">🎓</div><div class="wc-title">مرحباً بك في المنصة المحدثة!</div></div>
  <p class="text-sm text-white/75">اضغط على زر المعلم الصوتي (محمد) بالأسفل لتجربة المحادثة المباشرة المدعومة بالذكاء الاصطناعي الحقيقي بالكامل.</p>
</div>
</div>
</div>
</div>

<div id="voice-fab" class="vf-wrap">
  <button class="vf-orb" id="vf-orb" onclick="toggleVoiceFab()">
    <span class="material-symbols-outlined vf-orb-icon">psychology</span>
    <span class="vf-orb-label">محمد</span>
  </button>
</div>

<div class="vf-overlay" id="vf-overlay" onclick="if(event.target===this)toggleVoiceFab()">
  <div class="vf-panel" id="vf-panel">
    <div class="vf-hdr"><div class="vf-brand"><span class="vf-dot"></span><span class="vf-nm">محمد</span><small>Live AI Tutor</small></div><button class="vf-x" onclick="toggleVoiceFab()">✕</button></div>
    <div class="vf-state"><span id="vf-st-txt">متصل بالسيرفر الجديد 🟢</span></div>
    <div class="vf-shader-wrap" id="vf-shader-wrap"><canvas id="shader-canvas-ANIMATION_17" class="vf-shader-canvas"></canvas></div>
    <div class="vf-sts" id="vf-sts">اضغط المايك وابدأ التحدث بالإنجليزية فوراً!</div>
    <div class="vf-mic-w"><button class="vf-mic" id="vf-mic" onclick="vfToggleSession()"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg></button></div>
    <div class="vf-tr" id="vf-tr"></div>
  </div>
</div>

<script>
var _vfOpen=false, _vfRec=false;
var VF_API_URL = 'https://stylish-english-voice-backend.vercel.app/api/voice-session';

function enterPlatform() { document.body.classList.add('in-platform'); var d=document.getElementById('dashboard'); if(d)d.style.display='block'; }
function toggleVoiceFab() { _vfOpen=!_vfOpen; var o=document.getElementById('vf-overlay'); if(_vfOpen) o.classList.add('vf-modal-open'); else o.classList.remove('vf-modal-open'); }
function vfToggleSession() { 
  _vfRec=!_vfRec; 
  var m=document.getElementById('vf-mic'); 
  var sts=document.getElementById('vf-sts');
  if(_vfRec) { 
    m.classList.add('vf-rec'); 
    sts.textContent = '🎤 جاري الاستماع... تحدث الآن بالإنجليزية';
    startSpeechRecog();
  } else { 
    m.classList.remove('vf-rec'); 
    sts.textContent = 'اضغط المايك وتحدث بالإنجليزية';
  } 
}

function startSpeechRecog() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return;
  var recog = new SR(); recog.lang = 'en-US';
  recog.onresult = function(e) {
    var txt = e.results[0][0].transcript;
    if(txt) {
      addTranscriptRow(txt, 'user');
      sendToGemini(txt);
    }
  };
  recog.start();
}

function sendToGemini(userText) {
  var sts = document.getElementById('vf-sts');
  sts.textContent = '🤖 محمد يفكر الآن...';
  fetch(VF_API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: userText })
  })
  .then(res => res.json())
  .then(data => {
    if(data.reply) {
      addTranscriptRow(data.reply, 'ai');
      speak(data.reply);
      sts.textContent = '🎤 اضغط المايك للتحدث مرة أخرى';
      document.getElementById('vf-mic').classList.remove('vf-rec');
      _vfRec = false;
    }
  })
  .catch(err => {
    sts.textContent = '❌ حدث خطأ في الاتصال بالسيرفر الجديد';
  });
}

function addTranscriptRow(text, sender) {
  var tr = document.getElementById('vf-tr');
  var div = document.createElement('div');
  div.style.padding = '4px 0';
  div.style.color = sender === 'user' ? '#a5e7ff' : '#22c55e';
  div.textContent = (sender === 'user' ? '🎤 أنت: ' : '🤖 محمد: ') + text;
  tr.appendChild(div); tr.scrollTop = tr.scrollHeight;
}

function speak(text) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.9;
  window.speechSynthesis.speak(u);
}
</script>
